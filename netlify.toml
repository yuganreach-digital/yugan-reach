[build]
  publish = "."

# ── Redirect .in to .com (301 permanent) ──
[[redirects]]
  from    = "https://yuganreach.in/*"
  to      = "https://yuganreach.com/:splat"
  status  = 301
  force   = true

# ── www to non-www ──
[[redirects]]
  from    = "https://www.yuganreach.com/*"
  to      = "https://yuganreach.com/:splat"
  status  = 301
  force   = true

[[redirects]]
  from    = "https://www.yuganreach.in/*"
  to      = "https://yuganreach.com/:splat"
  status  = 301
  force   = true

# ── Security & performance headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Cache static assets aggressively ──
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTML: always revalidate ──
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
